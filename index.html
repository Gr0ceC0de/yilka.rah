<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yi-Sell Navigation Index</title>
    <meta name="description" content="Navigation Yi-Sell Trading Tools">
    <link rel="stylesheet" href="styles.css">
    <link rel="footer" href="footer.html">
</head>
<body>
<header>
    <h1>Yi-Sell Navigation Index</h1>
    <p>Click a section to jump inside the page</p>
</header>
<div class="container">
    <nav>
        <a href="TradingTools.html" class="ripple-btn">
            <img src="docs/rob.gif" alt="Info Products">
        </a>  
    </nav>
    <section id="trading-tools">
        <h2>Trading Tools</h2>
        <button type="button" class="ripple-btn">
            <img src="docs/TreMA.jpg" alt="Trend Advisory Forex">
            Robots and Tools: Script .mql5 Trend Advisory Forex
        </button>
    </section>

    <section id="Tranding Tools">
        <h2>Financial Algorithm</h2>

        <a href="TradingTools.html" target="_blank" rel="noopener noreferrer" class="ripple-btn">
            <img src="docs/Adas.gif" alt="Financial Algorithm">
        </a>
    </section>

    <section id="market">
        <h2>Market Overview</h2>
<a href="market-over-view.html" class="ripple-btn">
            <img src="docs/exchanges.gif" alt="Rates">
        </a>
        <p>Forex Major</p>
    </section>

    <section id="headlines">
        <h2>Headlines</h2>
        <p><a href="headlines.html" class="ripple-btn">
            <img src="docs/headtitle.gif" alt="Headlines">
        </a></p>
    </section>

    <section id="classified">
        <h2>Classified Ads</h2>
        <p><a href="classifieds.html" class="ripple-btn">
            <img src="docs/classsified.gif" alt="Classified">
        </a></p>
    </section>

</div>
<div id="footer"></div>
<script>
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer').innerHTML = data;
    });
</script>
    !-- 2. The Script to load header.html -->
    <script>
        // Fetch the file content
        fetch('header.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(data => {
                // Insert the HTML into the placeholder
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('There was a problem loading the header:', error);
            });
    </script>
</body>
</html>

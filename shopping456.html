<!DOCTYPE html>

    .cart { margin-top: 20px; border-top: 2px solid #000; padding-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    button { padding: 5px 10px; cursor: pointer; }
</style>
</head>
<body>

<h1>Products</h1>
<div id="products"></div>

<div class="cart">
    <h2>Shopping Cart</h2>
    <table id="cartTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price (R$)</th>
                <th>Quantity</th>
                <th>Total (R$)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <h3 id="cartTotal">Total: $0.00</h3>
</div>

<script>
// Sample product list
const products = [
    { id: 1, name: "Lenovo LOQ Intel Core i5-13450HX 16GB 512GB SSD Windows 11 Home RTX 3050", price: 6869.99 },
    { id: 2, name: "Notebook ASUS Vivobook 16X (K3605)Memória RAM 8GB e 512GB SSD", price:2889.99 },
    { id: 3, name: "Multiwave Lenght Q SWITCH nd yag Laser Machine", price: 48852.99 }
];

// Load cart from localStorage or start empty
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Render products
function renderProducts() {
    const container = document.getElementById("products");
    container.innerHTML = "";
    products.forEach(p => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
            <h3>${p.name}</h3>
            <p>Price: $${p.price.toFixed(2)}</p>
            <button onclick="addToCart(${p.id})">Add to Cart</button>
        `;
        container.appendChild(div);
    });
}

// Add product to cart
function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;

    const existing = cart.find(item => item.id === id);
    if (existing) {
        existing.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }
    saveCart();
    renderCart();
}

// Add product to cart
function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;

    const existing = cart.find(item => item.id === id);
    if (existing) {
        existing.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }
    saveCart();
    renderCart();
}

// Remove product from cart
function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    saveCart();
    renderCart();
}

// Update quantity
function updateQuantity(id, qty) {
    qty = parseInt(qty);
    if (isNaN(qty) || qty < 1) return; // Validation
    const item = cart.find(i => i.id === id);
    if (item) {
        item.quantity = qty;
        saveCart();
        renderCart();
    }
}

// Save cart to localStorage
function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

// Render cart table
function renderCart() {
    const tbody = document.querySelector("#cartTable tbody");
    tbody.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
        const row = document.createElement("tr");
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.price.toFixed(2)}</td>
            <td>
                <input type="number" value="${item.quantity}" min="1" 
                    onchange="updateQuantity(${item.id}, this.value)">
            </td>
            <td>${itemTotal.toFixed(2)}</td>
            <td><button onclick="removeFromCart(${item.id})">Remove</button></td>
        `;
        tbody.appendChild(row);
    });

    document.getElementById("cartTotal").textContent = `Total: $${total.toFixed(2)}`;
}

// Initial render
renderProducts();
renderCart();
</script>

</body>
